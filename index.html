<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Text Generator</title>

  <!-- SEO / basic meta -->
  <meta name="description" content="Create 3D text with custom fonts, colors and depth in real time.">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">

  <!-- Google Font default -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>

<body>

  <!-- Sidebar UI -->
  <aside class="ui">
    <header>
      <h1>3D Text Generator</h1>
      <p>Create and customize your 3D text</p>
    </header>

    <section class="controls">
      <label for="textInput">Text</label>
      <input 
        type="text" 
        id="textInput" 
        placeholder="Type your text..." 
        value="Hello 3D"
      >

      <label for="fontSelect">Font</label>
      <select id="fontSelect">
        <option value="Roboto">Roboto</option>
        <option value="Poppins">Poppins</option>
        <option value="Montserrat">Montserrat</option>
        <option value="Oswald">Oswald</option>
      </select>

      <label for="colorPicker">Color</label>
      <input type="color" id="colorPicker" value="#ff0000">

      <label for="sizeSlider">Size</label>
      <input 
        type="range" 
        id="sizeSlider" 
        min="1" 
        max="5" 
        step="0.1" 
        value="2"
      >

      <label for="depthSlider">Depth (3D)</label>
      <input 
        type="range" 
        id="depthSlider" 
        min="0.1" 
        max="2" 
        step="0.1" 
        value="0.5"
      >
    </section>

    <footer>
      <p>Made with Three.js</p>
    </footer>
  </aside>

  <!-- 3D Canvas Area -->
  <main id="canvas-container"></main>

  <!-- Script -->
  <script type="module" src="script.js"></script>

</body>
</html>
