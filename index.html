<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Text Generator</title>

  <link rel="stylesheet" href="styles.css">

  <!-- Default font -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>

<body>

  <aside class="ui">
    <h1>3D Text</h1>

    <label>Text</label>
    <input type="text" id="textInput" value="Hello 3D">

    <label>Font</label>
    <select id="fontSelect">
      <option value="Roboto">Roboto</option>
      <option value="Poppins">Poppins</option>
      <option value="Montserrat">Montserrat</option>
      <option value="Oswald">Oswald</option>
    </select>

    <label>Color</label>
    <input type="color" id="colorPicker" value="#ff0000">

    <label>Size</label>
    <input type="range" id="sizeSlider" min="1" max="5" step="0.1" value="2">

    <label>Depth</label>
    <input type="range" id="depthSlider" min="0.1" max="2" step="0.1" value="0.5">
  </aside>

  <main id="canvas-container"></main>

  <script type="module" src="script.js"></script>

</body>
</html>
